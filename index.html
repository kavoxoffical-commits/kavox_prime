<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVOX – Elite Career Craft</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --gold-dark: #A07830;
            --navy: #0D2159;
            --navy-deep: #060D2A;
            --navy-mid: #1a3578;
            --ivory: #F7F3EA;
            --ivory-dark: #EDE5D0;
            --text-dark: #1a1a2e;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--ivory);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .bg-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.05; pointer-events: none; z-index: 50;
        }

        header {
            padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(247, 243, 234, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--ivory-dark);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-weight: 900; font-size: 1.8rem;
            color: var(--navy); letter-spacing: 2px;
            text-decoration: none;
        }

        .logo span { color: var(--gold); }

        .hero {
            min-height: 80vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 2rem;
            background: radial-gradient(circle at center, #ffffff 0%, var(--ivory) 100%);
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            color: var(--navy-deep); margin-bottom: 1rem;
        }

        .hero p {
            max-width: 600px; font-size: 1.1rem;
            color: var(--text-dark); opacity: 0.8;
            margin-bottom: 2rem;
        }

        .btn-royal {
            padding: 1rem 2.5rem;
            background: var(--navy); color: var(--gold-light);
            font-family: 'Cinzel', serif; font-weight: 700;
            border: 1px solid var(--gold);
            cursor: pointer; transition: var(--transition);
            text-transform: uppercase; letter-spacing: 1px;
            position: relative; overflow: hidden;
        }

        .btn-royal:hover {
            background: var(--gold); color: var(--navy-deep);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(160, 120, 48, 0.2);
        }

        .container { max-width: 900px; margin: 3rem auto; padding: 0 1.5rem; }

        .wizard-card {
            background: white; padding: 2.5rem;
            border-top: 4px solid var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label {
            display: block; font-family: 'Cinzel', serif;
            margin-bottom: 0.5rem; color: var(--navy); font-size: 0.9rem;
        }

        input, textarea {
            width: 100%; padding: 1rem;
            border: 1px solid var(--ivory-dark);
            font-family: 'Montserrat', sans-serif;
            background: #fafafa; transition: var(--transition);
        }

        input:focus { border-color: var(--gold); outline: none; background: white; }
