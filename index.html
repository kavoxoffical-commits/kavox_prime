<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVOX – Elite Career Craft</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C; --gold-light: #E8C97A; --gold-dark: #A07830;
            --navy: #0D2159; --navy-deep: #060D2A; --ivory: #F7F3EA;
            --ivory-dark: #EDE5D0; --text-dark: #1a1a2e;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--ivory); color: var(--text-dark); overflow-x: hidden; }
        .bg-grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/natural-paper.png'); opacity: 0.05; pointer-events: none; z-index: 50; }
        header { padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(247, 243, 234, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--ivory-dark); }
        .logo { font-family: 'Cinzel', serif; font-weight: 900; font-size: 1.8rem; color: var(--navy); text-decoration: none; letter-spacing: 2px; }
        .logo span { color: var(--gold); }
        .hero { min-height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; background: radial-gradient(circle at center, #ffffff 0%, var(--ivory) 100%); }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 5vw, 4rem); color: var(--navy-deep); margin-bottom: 1.5rem; }
        .btn-royal { padding: 1.2rem 3rem; background: var(--navy); color: var(--gold-light); font-family: 'Cinzel', serif; font-weight: 700; border: 1px solid var(--gold); cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 2px; }
        .btn-royal:hover { background: var(--gold); color: var(--navy-deep); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(160, 120, 48, 0.2); }
        .container { max-width: 900px; margin: 4rem auto; padding: 0 2rem; display: none; }
        .wizard-card { background: white; padding: 3rem; border-top: 5px solid var(--gold); box-shadow: 0 30px 60px rgba(0,0,0,0.08); }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; font-family: 'Cinzel', serif; margin-bottom: 0.5rem; color: var(--navy); font-weight: 700; }
        input, textarea { width: 100%; padding: 1rem; border: 1px solid var(--ivory-dark); background: #fcfcfc; }
        .cv-doc { background: white; padding: 4rem; margin-top: 3rem; box-shadow: 0 30px 60px rgba(13, 33, 89, 0.1); border: 1px solid var(--ivory-dark); max-width: 800px; margin-left: auto; margin-right: auto; display: none; }
    </style>
</head>
<body>
    <div class="bg-grain"></div>
    <header>
        <a href="#" class="logo">KAVOX<span>.</span></a>
        <div style="font-family:'Cinzel'; font-size: 0.7rem; color: var(--gold-dark);">EST. 2024</div>
    </header>

    <section class="hero" id="hero-section">
        <div style="color: var(--gold); font-family: 'Cinzel'; letter-spacing: 5px; margin-bottom: 1rem;">PREMIUM CAREER ARCHITECTURE</div>
        <h1>Engineered for Excellence</h1>
        <p>Architecting professional legacies for the world's most ambitious leaders.</p>
        <br>
        <button class="btn-royal" onclick="showWizard()">Build Your Legacy</button>
    </section>

    <div class="container" id="wizard-container">
        <div class="wizard-card">
            <h2 style="font-family:'Cinzel'; margin-bottom: 2rem; color: var(--navy);">Professional Identity</h2>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="in-name" placeholder="E.G. ALEXANDER VANCE">
            </div>
            <div class="input-group">
                <label>Designation</label>
                <input type="text" id="in-title" placeholder="E.G. CHIEF STRATEGY OFFICER">
            </div>
            <div class="input-group">
                <label>Career Narrative</label>
                <textarea id="in-exp" rows="5" placeholder="Milestones and impact..."></textarea>
            </div>
            <button class="btn-royal" style="width:100%" onclick="generateCV()">Forge Document</button>
        </div>
    </div>

    <div class="cv-doc" id="cv-result">
        <div style="text-align:center; border-bottom: 2px solid var(--gold); padding-bottom: 2rem;">
            <h1 id="out-name" style="font-family:'Cinzel'; font-size: 2.5rem;"></h1>
            <p id="out-title" style="letter-spacing:3px; color: var(--navy);"></p>
        </div>
        <div style="margin-top:2rem;">
            <h3 style="font-family:'Cinzel'; color: var(--gold-dark);">Executive Summary</h3>
            <p id="out-summary" style="margin-top:1rem; line-height:1.8;"></p>
        </div>
    </div>

    <script>
        function showWizard() {
            document.getElementById('hero-section').style.display = 'none';
            document.getElementById('wizard-container').style.display = 'block';
        }
        function generateCV() {
            document.getElementById('out-name').textContent = document.getElementById('in-name').value.toUpperCase();
            document.getElementById('out-title').textContent = document.getElementById('in-title').value.toUpperCase();
            document.getElementById('out-summary').textContent = document.getElementById('in-exp').value;
            document.getElementById('cv-result').style.display = 'block';
            window.scrollTo({ top: document.getElementById('cv-result').offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
